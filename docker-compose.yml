services:

  api:
    build: ./docker/php
    container_name: training_api
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
    ports:
      - "8000:8000"
    depends_on:
      - db
    command: php artisan serve --host=0.0.0.0 --port=8000

  frontend:
    build: ./docker/frontend
    container_name: training_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "4200:4200"
    environment:
      CHROME_BIN: /usr/bin/chromium
    command: bash -c "npm install && npm start"

  db:
    image: mysql:8
    container_name: training_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: training
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql   # persistencia de datos

  dbgate:
    image: dbgate/dbgate
    container_name: training_dbgate
    ports:
      - "9051:3000"
    depends_on:
      - db
    environment:
      CONNECTIONS: training
      LABEL_training: Training MySQL
      SERVER_training: db
      USER_training: root
      PASSWORD_training: root
      PORT_training: "3306"
      DATABASE_training: training
      ENGINE_training: mysql@dbgate-plugin-mysql
    volumes:
      - ./docker/dbgate-data:/root/.dbgate

# Volúmenes persistentes
volumes:
  db_data: